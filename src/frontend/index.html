<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>RAG Programming Support System</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">Source-Grounded RAG Support</p>
      <h1>Programming Learning Assistant</h1>
      <p class="subtitle">
        Ask an introductory programming question and receive a
        source-grounded answer or staged hint with citations.
      </p>
    </section>

    <section class="card">
      <label for="queryInput" class="label">
        Learner question
      </label>

      <textarea
        id="queryInput"
        rows="5"
        placeholder="Example: What is a variable in Python?"
      >What is a variable in Python?</textarea>

      <div class="controls">
        <div>
          <label for="responseModeInput" class="label">
            Response mode
          </label>

          <select id="responseModeInput">
            <option value="auto" selected>
              Auto detect
            </option>
            <option value="answer">
              Full explanation
            </option>
            <option value="hint">
              Staged hint
            </option>
          </select>
        </div>

        <div>
          <label for="hintLevelInput" class="label">
            Hint level
          </label>

          <select id="hintLevelInput">
            <option value="1" selected>
              Level 1 — conceptual clue
            </option>
            <option value="2">
              Level 2 — specific guidance
            </option>
            <option value="3">
              Level 3 — incomplete scaffold
            </option>
          </select>
        </div>

        <div>
          <label for="topKInput" class="label">
            Top K sources
          </label>

          <input
            id="topKInput"
            type="number"
            min="1"
            max="10"
            value="3"
          />
        </div>

        <div>
          <label for="minSimilarityInput" class="label">
            Minimum similarity threshold
          </label>

          <input
            id="minSimilarityInput"
            type="number"
            min="0"
            max="1"
            step="0.01"
            placeholder="Optional"
          />
        </div>
      </div>

      <p class="help-text">
        Auto mode detects phrases such as “give me a hint” or
        “do not give me the full answer”.
      </p>

      <div class="button-row">
        <button id="askButton">
          Ask question
        </button>

        <button
          id="hintButton"
          class="secondary-button"
        >
          Try staged hint example
        </button>

        <button
          id="insufficientButton"
          class="secondary-button"
        >
          Try insufficient evidence example
        </button>
      </div>

      <p id="statusMessage" class="status-message"></p>
    </section>

    <section
      id="resultPanel"
      class="card result-panel hidden"
    >
      <div class="result-header">
        <h2>Response</h2>
        <span
          id="answerStatus"
          class="status-badge"
        ></span>
      </div>

      <p id="answerText" class="answer-text"></p>

      <h3>Retrieved Sources</h3>
      <div
        id="sourcesList"
        class="sources-list"
      ></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
